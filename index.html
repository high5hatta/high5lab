<html lang="ja">
<head>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }

    h1 {
      color: #fff;
      font-size: 1.3rem;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .subtitle {
      color: #aaa;
      font-size: 0.82rem;
      margin-bottom: 10px;
    }

    /* 接続状態 */
    .status-bar {
      font-size: 0.75rem;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 28px;
    }
    .status-bar.connecting { background: #334155; color: #94a3b8; }
    .status-bar.connected  { background: #14532d; color: #86efac; }
    .status-bar.error      { background: #7f1d1d; color: #fca5a5; }

    /* ── deck area ── */
    .deck-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 44px;
    }

    .deck-wrapper {
      position: relative;
      width: 190px;
      height: 265px;
      margin-bottom: 18px;
      cursor: pointer;
    }

    .deck-wrapper.empty { cursor: default; opacity: 0.5; }

    .deck-wrapper::before,
    .deck-wrapper::after {
      content: '';
      position: absolute;
      width: 190px;
      height: 265px;
      border-radius: 18px;
      background: #0ea5e9;
      transition: opacity 0.3s;
    }
    .deck-wrapper::before { top: -8px; left: 5px; opacity: 0.45; }
    .deck-wrapper::after  { top: -4px; left: 2px; opacity: 0.65; }
    .deck-wrapper.empty::before,
    .deck-wrapper.empty::after { opacity: 0; }

    .deck-card {
      position: absolute;
      width: 190px;
      height: 265px;
      border-radius: 18px;
      background: linear-gradient(135deg, #06b6d4, #0284c7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 28px rgba(0,0,0,0.45);
      transition: transform 0.14s;
      z-index: 1;
      user-select: none;
    }
    .deck-wrapper:not(.empty) .deck-card:hover { transform: translateY(-5px) scale(1.02); }
    .deck-wrapper:not(.empty) .deck-card:active { transform: scale(0.96); }

    .deck-card .q-mark {
      font-size: 5.5rem;
      color: #fff;
      line-height: 1;
      text-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }
    .deck-card .draw-label {
      color: #e0f7fa;
      font-size: 0.8rem;
      margin-top: 12px;
      letter-spacing: 0.1em;
    }

    .deck-count {
      color: #888;
      font-size: 0.82rem;
    }

    /* ── flipped card ── */
    .result-area {
      perspective: 900px;
      width: 240px;
      height: 320px;
      display: none;
      margin-bottom: 32px;
    }
    .result-area.visible { display: block; }

    .flip-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: flipIn 0.6s ease forwards;
    }

    @keyframes flipIn {
      0%   { transform: rotateY(90deg) scale(0.8); opacity: 0; }
      60%  { transform: rotateY(-8deg) scale(1.04); opacity: 1; }
      100% { transform: rotateY(0deg) scale(1); opacity: 1; }
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 22px 18px;
      backface-visibility: hidden;
    }

    .card-front {
      background: #facc15;
      box-shadow: 0 12px 34px rgba(0,0,0,0.38);
    }

    .card-category {
      font-size: 0.7rem;
      color: #92400e;
      background: rgba(255,255,255,0.48);
      border-radius: 20px;
      padding: 3px 12px;
      margin-bottom: 16px;
      letter-spacing: 0.07em;
    }

    .card-theme {
      font-size: 1.38rem;
      font-weight: 700;
      color: #1c1917;
      text-align: center;
      line-height: 1.6;
      white-space: pre-line;
    }

    .card-example {
      margin-top: 16px;
      font-size: 0.72rem;
      color: #44403c;
      background: rgba(255,255,255,0.52);
      border-radius: 10px;
      padding: 7px 13px;
      text-align: center;
      line-height: 1.55;
    }

    .corner-deco {
      position: absolute;
      font-size: 0.65rem;
      color: rgba(0,0,0,0.22);
    }
    .corner-deco.tl { top: 11px; left: 13px; }
    .corner-deco.br { bottom: 11px; right: 13px; transform: rotate(180deg); }

    /* ── buttons ── */
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .reset-btn {
      padding: 11px 32px;
      border-radius: 30px;
      border: none;
      background: #f59e0b;
      color: #1c1917;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.28);
      transition: background 0.15s, transform 0.1s;
    }
    .reset-btn:hover { background: #fbbf24; transform: scale(1.04); }
  </style>
</head>

  { cat: "自分",   theme: "死ぬ前に\nやりたいことは？",        example: "例：世界一周、本を書く…" },
];

// ── ユーティリティ ─────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── UI 更新 ────────────────────────────────────
function setStatus(state, text) {
  const el = document.getElementById('statusBar');
  el.className = 'status-bar ' + state;
  el.textContent = text;
}

function updateUI(remaining, lastCard) {
  const count = remaining ? remaining.length : 0;
  const countEl = document.getElementById('deckCount');
  const wrapper = document.getElementById('deckWrapper');
  const label   = document.getElementById('drawLabel');

  if (count > 0) {
    countEl.textContent = `残り ${count} 枚`;
    wrapper.classList.remove('empty');
    label.textContent = 'タップして引く';
  } else {
    countEl.textContent = 'カードがなくなりました！';
    wrapper.classList.add('empty');
    label.textContent = 'リセットしてね';
  }

  if (lastCard !== null && lastCard !== undefined && CARDS[lastCard]) {
    const card = CARDS[lastCard];
    document.getElementById('cardCategory').textContent = card.cat;
    document.getElementById('cardTheme').textContent    = card.theme;
    document.getElementById('cardExample').textContent  = card.example;

    const area = document.getElementById('resultArea');
    area.classList.add('visible');
    const fc = document.getElementById('flipCard');
    fc.style.animation = 'none';
    fc.offsetHeight;
    fc.style.animation = '';
  }
}

// ── Firebase リスナー ──────────────────────────
let currentRemaining = [];

roomRef.on('value', (snapshot) => {
  setStatus('connected', '● 接続中（リアルタイム同期）');
  const data = snapshot.val();
  if (data && Array.isArray(data.remaining)) {
    currentRemaining = data.remaining;
    updateUI(data.remaining, data.lastCard);
  } else {
    // 初回：データがなければ初期化
    initRoom();
  }
}, (error) => {
  setStatus('error', '⚠ 接続エラー：' + error.message);
});

function initRoom() {
  const indices = shuffle(CARDS.map((_, i) => i));
  roomRef.set({ remaining: indices, lastCard: null });
}

// ── カードを引く（トランザクションで同時引きを防止）──
function drawCard() {
  if (currentRemaining.length === 0) return;

  roomRef.transaction((current) => {
    if (!current || !Array.isArray(current.remaining) || current.remaining.length === 0) {
      return; // 中断
    }
    const newRemaining = [...current.remaining];
    const idx = newRemaining.pop();
    return { remaining: newRemaining, lastCard: idx };
  });
}

// ── リセット ───────────────────────────────────
function resetAll() {
  if (!confirm('全員のカードをリセットしますか？')) return;
  initRoom();
  document.getElementById('resultArea').classList.remove('visible');
}
</script>
